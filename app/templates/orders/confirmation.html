{% extends "base.html" %}

{% block title %}Order Confirmed — ShopHub{% endblock %}

{% block content %}
<div class="container narrow-page">
  <div class="card success-card">
    <div class="success-icon">✓</div>
    <h1>Thank You!</h1>
    <p>Your order <strong>{{ order.order_number }}</strong> has been placed successfully.</p>
    <p>Payment method: Cash on Delivery</p>
    <p>Total: <strong>₹{{ order.total }}</strong></p>
    <div class="btn-row">
      <a href="{{ url_for('orders.order_detail', order_number=order.order_number) }}" class="btn btn-primary">View Order</a>
      <a href="{{ url_for('products.home') }}" class="btn btn-secondary">Continue Shopping</a>
    </div>
  </div>
</div>
{% endblock %}
