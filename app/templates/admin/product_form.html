{% extends "base.html" %}

{% block title %}{% if product %}Edit{% else %}Add{% endif %} Product — ShopHub{% endblock %}

{% block content %}
<div class="container admin-page narrow-page">
  <div class="admin-header">
    <h1>{% if product %}Edit Product{% else %}Add Product{% endif %}</h1>
    <nav class="admin-nav">
      <a href="{{ url_for('admin.products') }}">← Back to Products</a>
    </nav>
  </div>

  <div class="card">
    <form method="post" enctype="multipart/form-data">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" value="{{ product.name if product else '' }}" required>
      </div>
      <div class="form-group">
        <label for="category_id">Category</label>
        <select id="category_id" name="category_id" required>
          {% for cat in categories %}
          <option value="{{ cat.id }}" {% if product and product.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description" rows="5" required>{{ product.description if product else '' }}</textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="price">Price</label>
          <input type="number" id="price" name="price" step="0.01" min="0" value="{{ product.price if product else '' }}" required>
        </div>
        <div class="form-group">
          <label for="compare_price">Compare Price</label>
          <input type="number" id="compare_price" name="compare_price" step="0.01" min="0" value="{{ product.compare_price if product and product.compare_price else '' }}">
        </div>
        <div class="form-group">
          <label for="stock">Stock</label>
          <input type="number" id="stock" name="stock" min="0" value="{{ product.stock if product else 0 }}" required>
        </div>
        <div class="form-group">
          <label for="sku">SKU</label>
          <input type="text" id="sku" name="sku" value="{{ product.sku if product else '' }}" required>
        </div>
      </div>
      <div class="form-group">
        <label class="checkbox-label"><input type="checkbox" name="is_active" {% if not product or product.is_active %}checked{% endif %}> Active</label>
      </div>
      <div class="form-group">
        <label for="images">Product Images</label>
        <input type="file" id="images" name="images" accept="image/*" multiple>
      </div>
      <button type="submit" class="btn btn-primary">Save Product</button>
    </form>
  </div>
</div>
{% endblock %}
